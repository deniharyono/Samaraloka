<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serat Ulem Pernikahan</title>
    
    <!-- Google Fonts Integration for Javanese Theme -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- AOS Library CSS for Smooth Scroll Animation -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" />
    
    <!-- Link to Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-no-scroll">

    <!-- Audio Latar Belakang (Menggunakan Musik Gamelan/Ethnic yang Valid & Aktif) -->
    <audio id="audio-latar" <audio id="audio-latar" src="gamelan.mp3" loop></audio>

    <!-- SEKAT SAMPUL / OVERLAY PEMBUKA (THEMA JAWA) -->
    <div id="sekat-sampul" class="sekat-sampul">
        <div class="konten-sampul">
            <!-- Ornamen Gunungan Wayang -->
            <div class="ornamen-gunungan" data-aos="fade-down">
                <img src="gunungan.png" alt="Gunungan Wayang" class="gambar-wayang">
            </div>
            
            <h1 class="sub-judul-jawa">Serat Ulem Pernikahan</h1>
            <h2 class="nama-pengantin-jawa">Arif & Kayla</h2>
            
            <p class="tamu-dumateng">Katur Dumateng Bapak/Ibu/Saudara/i:</p>
            <h3 id="nama-penerima">Tamu Undangan</h3>
            
            <button class="tombol-buka">Buka Undangan (Mlebet)</button>
        </div>
    </div>

    <!-- KONTEN UTAMA UNDANGAN -->
    <main class="konten-utama">
        
        <!-- Section Hero / Pembuka -->
        <section class="hero" data-aos="fade-up">
            <h1 class="nama-pengantin-jawa" style="color: var(--warna-utama); text-shadow: none;">Arif & Kayla</h1>
            <p style="letter-spacing: 3px; text-transform: uppercase;">Sabtu, 12 Desember 2026</p>
        </section>

        <!-- Section Hitung Mundur Waktu (Countdown) -->
        <section class="hitung-mundur" data-aos="zoom-in" data-aos-delay="200">
            <h3>Menuju Hari Bahagia</h3>
            <div id="counter-wedding" class="timer-wrapper">
                <div class="time-box"><span class="hari">00</span><p>Hari</p></div>
                <div class="time-box"><span class="jam">00</span><p>Jam</p></div>
                <div class="time-box"><span class="menit">00</span><p>Menit</p></div>
                <div class="time-box"><span class="detik">00</span><p>Detik</p></div>
            </div>
        </section>

        <!-- Section Formulir RSVP Konfirmasi Kehadiran -->
        <section class="rsvp-section" data-aos="fade-up">
            <h3>Konfirmasi Kehadiran (RSVP)</h3>
            <form id="form-rsvp">
                <input type="text" id="rsvp-nama" name="nama_tamu" placeholder="Nama Tamu" readonly required>
                
                <select name="kehadiran" required>
                    <option value="">-- Pilih Kehadiran --</option>
                    <option value="Hadir">Hadir (Mlebet)</option>
                    <option value="Absen">Absen / Tidak Hadir</option>
                    <option value="Ragu">Ragu-ragu</option>
                </select>
                
                <input type="number" name="porsi_tambahan" min="0" max="4" placeholder="Jumlah Porsi Tambahan (0-4)">
                
                <textarea name="alergi" placeholder="Catatan Alergi / Pesan Doa / Berkah Pangestu"></textarea>
                
                <!-- Token Pengaman Internal Database -->
                <input type="hidden" name="kode_akses" value="VERIFIED_USER">
                
                <button type="submit">Kirim Konfirmasi</button>
            </form>
            <div id="status-kirim"></div>
        </section>
        
    </main>

    <!-- AOS Library JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
    
    <!-- Link to JavaScript Core Integrasi -->
    <script src="script.js"></script>
</body>
</html>
